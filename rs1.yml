apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: retail-rs
  namespace: likhitha-ns
  labels:
    app: retail-app
spec: # it defines the behaviour of the replicaset
  replicas: 3
  selector: # it is used to identify the pods that belong to this replicaset
    matchLabels:
      app: retail
  template: # it contains pod definition
    metadata:
      labels:
        app: retail
    spec: # it contains container definition
      containers:
        - name: retail-container
          image: likhithabhogyam/retail-inventory-app:latest
          ports:
            - containerPort: 3000