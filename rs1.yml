apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: retail-rs
  namespace: likhitha-ns
  labels:
    app: retail-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: retail
  template:
    metadata:
      labels:
        app: retail
    spec:
      containers:
        - name: retail-container
          image: likhithabhogyam/retail-inventory-app:latest
          ports:
            - containerPort: 3000
