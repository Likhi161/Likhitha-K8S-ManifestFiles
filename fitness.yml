apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitness-dep
  namespace: likhitha-ns
  labels:
    app: fitness
spec:
  replicas: 6
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2
      maxSurge: 2
  selector:
    matchLabels:
      app: fitness-web
  template:
    metadata:
      labels:
        app: fitness-web
    spec:
      containers:
        - name: fitness-container
          image: muralisocial123/fitness-app:v1.0.1
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: fitness-dep-svc
  namespace: likhitha-ns
spec:
  selector:
    app: fitness-web
  ports:
    - port: 3001 #it is a service port number, we are using to expose the application to the internet
      targetPort: 5000
      protocol: TCP
  type: NodePort