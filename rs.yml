apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: ey-cart-rs
  namespace: likhitha-ns
  labels:
    app: cart
spec: # it defines the behaviour of the replicaset
  replicas: 3
  selector: # it is used to identify the pods that belong to this replicaset
    matchLabels:
      app: web
  template: # it contains pod definition
    metadata:
      labels:
        app: web
    spec: # it contains container definition
      containers:
        - name: ui-cart-container
          image: muralisocial123/flipkart-app-web:v1.1.0
          ports:
            - containerPort: 3000